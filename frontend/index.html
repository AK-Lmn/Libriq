<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Libriq — Your reading life, beautifully organized." />
  <title>Libriq</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Phosphor Icons (lightweight, beautiful) -->
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js" defer></script>

  <!-- CSS -->
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/sidebar.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/modals.css" />
  <link rel="stylesheet" href="css/animations.css" />
</head>
<body>
  <!-- App Shell -->
  <div id="app" class="app-shell">

    <!-- Sidebar Navigation -->
    <aside id="sidebar" class="sidebar" role="navigation" aria-label="Main navigation">
      <!-- Logo -->
      <div class="sidebar-logo">
        <div class="logo-mark">
          <span class="logo-icon">⌘</span>
        </div>
        <span class="logo-text">Libriq</span>
      </div>

      <!-- Search trigger -->
      <button class="sidebar-search-btn" id="openSearch" aria-label="Search books">
        <i class="ph ph-magnifying-glass"></i>
        <span>Search books…</span>
        <kbd>⌘K</kbd>
      </button>

      <!-- Primary Nav -->
      <nav class="sidebar-nav">
        <span class="nav-section-label">Library</span>
        <ul class="nav-list" role="list">
          <li>
            <button class="nav-item active" data-page="dashboard" aria-current="page">
              <i class="ph ph-house"></i>
              <span>Dashboard</span>
            </button>
          </li>
          <li>
            <button class="nav-item" data-page="library">
              <i class="ph ph-books"></i>
              <span>My Library</span>
              <span class="nav-badge" id="badge-library">0</span>
            </button>
          </li>
          <li>
            <button class="nav-item" data-page="reading">
              <i class="ph ph-book-open"></i>
              <span>Reading Now</span>
              <span class="nav-badge reading" id="badge-reading">0</span>
            </button>
          </li>
          <li>
            <button class="nav-item" data-page="wishlist">
              <i class="ph ph-bookmark"></i>
              <span>Want to Read</span>
              <span class="nav-badge" id="badge-wishlist">0</span>
            </button>
          </li>
          <li>
            <button class="nav-item" data-page="finished">
              <i class="ph ph-check-circle"></i>
              <span>Finished</span>
              <span class="nav-badge success" id="badge-finished">0</span>
            </button>
          </li>
          <li>
            <button class="nav-item" data-page="favorites">
              <i class="ph ph-heart"></i>
              <span>Favorites</span>
            </button>
          </li>
        </ul>

        <span class="nav-section-label">Discover</span>
        <ul class="nav-list" role="list">
          <li>
            <button class="nav-item" data-page="stats">
              <i class="ph ph-chart-bar"></i>
              <span>Statistics</span>
            </button>
          </li>
          <li>
            <button class="nav-item" data-page="goals">
              <i class="ph ph-target"></i>
              <span>Reading Goals</span>
            </button>
          </li>
        </ul>

        <span class="nav-section-label">Account</span>
        <ul class="nav-list" role="list">
          <li>
            <button class="nav-item" data-page="profile">
              <i class="ph ph-user-circle"></i>
              <span>Profile</span>
            </button>
          </li>
          <li>
            <button class="nav-item" data-page="settings">
              <i class="ph ph-gear"></i>
              <span>Settings</span>
            </button>
          </li>
        </ul>
      </nav>

      <!-- Streak Widget -->
      <div class="sidebar-streak" id="streakWidget">
        <div class="streak-flame">🔥</div>
        <div class="streak-info">
          <span class="streak-count" id="streakCount">0</span>
          <span class="streak-label">day streak</span>
        </div>
      </div>

      <!-- Theme Toggle -->
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <i class="ph ph-moon" id="themeIcon"></i>
        <span id="themeLabel">Dark mode</span>
      </button>
    </aside>

    <!-- Mobile Top Bar -->
    <header class="mobile-topbar">
      <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Open menu">
        <i class="ph ph-list"></i>
      </button>
      <div class="mobile-logo">Libriq</div>
      <button class="mobile-search-btn" id="mobileSearchBtn" aria-label="Search">
        <i class="ph ph-magnifying-glass"></i>
      </button>
    </header>

    <!-- Sidebar Overlay (mobile) -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Main Content Area -->
    <main id="mainContent" class="main-content" role="main">
      <!-- Pages injected here by JS -->
    </main>

  </div>

  <!-- Search Modal -->
  <div class="modal-overlay" id="searchModal" role="dialog" aria-modal="true" aria-label="Search books" hidden>
    <div class="modal search-modal">
      <div class="search-input-wrap">
        <i class="ph ph-magnifying-glass search-input-icon"></i>
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="Search by title, author, or ISBN…"
          autocomplete="off"
          spellcheck="false"
        />
        <button class="search-close-btn" id="closeSearch" aria-label="Close search">
          <kbd>ESC</kbd>
        </button>
      </div>
      <div class="search-results" id="searchResults">
        <div class="search-empty-state" id="searchEmptyState">
          <i class="ph ph-books"></i>
          <p>Search for any book to add it to your library</p>
        </div>
      </div>
      <div class="search-footer">
        <span><kbd>↑</kbd><kbd>↓</kbd> navigate</span>
        <span><kbd>↵</kbd> select</span>
        <span><kbd>ESC</kbd> close</span>
      </div>
    </div>
  </div>

  <!-- Add Book Modal -->
  <div class="modal-overlay" id="addBookModal" role="dialog" aria-modal="true" aria-label="Add book to library" hidden>
    <div class="modal add-book-modal">
      <div class="modal-header">
        <h2 class="modal-title">Add to Library</h2>
        <button class="modal-close" id="closeAddBook" aria-label="Close">
          <i class="ph ph-x"></i>
        </button>
      </div>
      <div class="modal-body" id="addBookBody">
        <!-- Populated by JS -->
      </div>
    </div>
  </div>

  <!-- Book Details Modal -->
  <div class="modal-overlay" id="bookDetailsModal" role="dialog" aria-modal="true" aria-label="Book details" hidden>
    <div class="modal book-details-modal">
      <div class="modal-header">
        <h2 class="modal-title">Book Details</h2>
        <button class="modal-close" aria-label="Close">
          <i class="ph ph-x"></i>
        </button>
      </div>
      <div class="modal-body" id="bookDetailsBody">
        <!-- Populated by JS -->
      </div>
    </div>
  </div>

  <!-- Toast Notifications -->
  <div class="toast-container" id="toastContainer" aria-live="polite"></div>

  <!-- JavaScript -->
  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/utils.js"></script>
  <!-- API layer — must load before search.js -->
  <script src="js/api/normalizeBook.js"></script>
  <script src="js/api/openLibrary.js"></script>
  <script src="js/api/googleBooks.js"></script>
  <script src="js/api/mergeBooks.js"></script>
  <script src="js/api/cache.js"></script>
  <script src="js/api/index.js"></script>
  <!-- App modules -->
  <script src="js/search.js"></script>
  <script src="js/library.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
